<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Parco Giochi Matematico</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Arial', sans-serif; 
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); 
            display: flex; flex-direction: column; align-items: center; padding: 20px; color: #7c2d12;
            min-height: 100vh;
        }
        .academy-header { background: #fef3c7; border: 3px dashed #f59e0b; padding: 10px 20px; border-radius: 50px; font-weight: bold; margin-bottom: 20px; box-shadow: 0 4px 0 #d97706; }
        #tower-game { display: flex; flex-direction: column-reverse; align-items: center; gap: 15px; margin-top: 20px; }
        .block { 
            width: 180px; height: 60px; background: #8b5cf6; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            color: white; cursor: pointer; transition: 0.3s; border-bottom: 6px solid #5b21b6;
        }
        .block:hover { transform: translateY(-5px) scale(1.05); background: #7c3aed; }
        .tip-box { 
            background: rgba(255,255,255,0.8); border: 3px solid #f59e0b; padding: 20px; 
            border-radius: 25px; margin-top: 30px; max-width: 400px; text-align: center;
        }
        h1 { text-shadow: 2px 2px #fff; color: #ea580c; }
    </style>
</head>
<body>

    <img src="https://raw.githubusercontent.com/giomaglione75-crypto/boingyblue.github.io/e5cb3103735ceaff77d77fb0fa71371ebcaf78a8/logo%20Giochi.png" alt="Logo Accademia" style="width: 150px; margin-bottom: 20px;">

    <h1>🎡 Parco Giochi Matematico</h1>
    <div class="academy-header">🔢 Accademia dei Numeri</div>

    <div id="equation-display" style="font-size: 32px; font-weight: bold; background: white; padding: 15px 30px; border-radius: 20px; border: 4px solid #f59e0b;">Quanto fa 2 + 2?</div>
    <div id="tower-game"></div>

    <div class="tip-box">
        <strong>💡 Boingy-Consiglio:</strong> Ogni blocco è un pezzetto di una giostra! Scegli quello giusto per farla girare. Se sbagli, non preoccuparti, il Parco Giochi è fatto per imparare giocando! 🌈
    </div>

    <script>
        const tower = document.getElementById('tower-game');
        const display = document.getElementById('equation-display');
        let currentSum = 0;

        function nextRound() {
            const a = Math.floor(Math.random() * 8) + 1;
            const b = Math.floor(Math.random() * 8) + 1;
            currentSum = a + b;
            display.innerText = `${a} + ${b} = ?`;
            renderChoices();
        }

        function renderChoices() {
            tower.innerHTML = '';
            const options = [currentSum, currentSum + 2, currentSum - 1].sort(() => Math.random() - 0.5);
            options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'block';
                div.innerText = opt + " 🍭";
                div.onclick = () => {
                    if(opt === currentSum) {
                        div.style.background = "#22c55e";
                        div.style.borderColor = "#166534";
                        alert("🎉 Evviva! Hai vinto un gettone per la giostra!");
                        nextRound();
                    } else {
                        div.style.background = "#ef4444";
                        div.style.borderColor = "#991b1b";
                        setTimeout(() => {
                            div.style.background = "#8b5cf6";
                            div.style.borderColor = "#5b21b6";
                        }, 500);
                    }
                };
                tower.appendChild(div);
            });
        }

        nextRound();
    </script>
</body>
</html>
