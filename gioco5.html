<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accademia della Logica - Labirinto Spaziale</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #334155; }
        h1 { color: #2563eb; }
        .academy-header { background: #dbeafe; padding: 10px 20px; border-radius: 20px; font-weight: bold; color: #1e40af; margin-bottom: 20px; }
        #game-board { display: grid; grid-template-columns: repeat(5, 60px); grid-template-rows: repeat(5, 60px); gap: 5px; background: #94a3b8; padding: 10px; border-radius: 15px; }
        .cell { width: 60px; height: 60px; background: #e2e8f0; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; transition: 0.2s; }
        .player { background: #fbbf24 !important; }
        .goal { background: #22c55e !important; }
        .wall { background: #475569 !important; cursor: not-allowed; }
        .tip-box { background: #fffbeb; border: 2px solid #fbbf24; padding: 15px; border-radius: 15px; margin-top: 20px; max-width: 400px; }
        .btn { margin-top: 20px; padding: 12px 30px; background: #2563eb; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <img src="https://raw.githubusercontent.com/giomaglione75-crypto/boingyblue.github.io/e5cb3103735ceaff77d77fb0fa71371ebcaf78a8/logo%20Giochi.png" alt="Logo Accademia" style="width: 120px; margin-bottom: 20px;">

    <h1>Labirinto Spaziale</h1>
    <div class="academy-header">🎯 Accademia della Logica</div>

    <div id="game-board"></div>

    <div class="tip-box">
        <strong>💡 Boingy-Consiglio:</strong> Guarda bene le caselle scure: sono <strong>muri invalicabili</strong>! Pianifica il percorso con gli occhi prima di muovere il tuo personaggio (il pallino giallo).
    </div>

    <button class="btn" onclick="initGame()">Nuova Sfida</button>

    <script>
        const board = document.getElementById('game-board');
        let playerPos = 0;
        const goalPos = 24;
        // Definizione dei muri (caselle non accessibili)
        const walls = [6, 7, 8, 13, 17, 18, 19];

        function initGame() {
            playerPos = 0;
            board.innerHTML = '';
            for(let i=0; i<25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${i}`;
                if(walls.includes(i)) cell.classList.add('wall');
                if(i === goalPos) cell.innerHTML = '🏁';
                cell.onclick = () => movePlayer(i);
                board.appendChild(cell);
            }
            updatePlayerView();
        }

        function updatePlayerView() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('player'));
            document.getElementById(`cell-${playerPos}`).classList.add('player');
        }

        function movePlayer(index) {
            if(walls.includes(index)) return; // Non passare attraverso i muri
            
            // Verifica movimento adiacente
            const row = Math.floor(playerPos / 5);
            const col = playerPos % 5;
            const newRow = Math.floor(index / 5);
            const newCol = index % 5;
            
            if (Math.abs(row - newRow) + Math.abs(col - newCol) === 1) {
                playerPos = index;
                updatePlayerView();
                if(playerPos === goalPos) setTimeout(() => alert("Missione compiuta! Sei un genio dello spazio!"), 100);
            }
        }

        initGame();
    </script>
</body>
</html>
