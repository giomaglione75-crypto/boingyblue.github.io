<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <style>
        .boingy-container { font-family: 'Comic Sans MS', sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f0f7ff; border-radius: 25px; border: 4px solid #ffc300; }
        .header { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #ff9f43, #ff6b6b); padding: 20px; border-radius: 20px; color: white; gap: 20px; }
        .mascotte { width: 120px; }
        .word-btn { background: #f1c40f; border: 2px solid #e67e22; padding: 10px 20px; border-radius: 15px; margin: 5px; cursor: pointer; font-size: 1.2rem; }
        .word-btn.selected { background: #3498db; color: white; }
        .game-box { background: white; padding: 20px; border-radius: 20px; margin: 20px 0; border: 3px dashed #3498db; }
        .action-btns { display: flex; justify-content: center; gap: 10px; }
        .btn-check { background: #2ecc71; color: white; border: none; padding: 15px 30px; border-radius: 20px; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
<nav style="text-align: center; padding: 20px;">
  <a href="index.html" style="margin: 0 15px; font-size: 1.2rem;">🏠 Home Gioco 1</a>
  <a href="gioco2.html" style="margin: 0 15px; font-size: 1.2rem;">🚀 Vai al Gioco 2</a>
</nav>
<div class="boingy-container">
    <div class="header">
       <img src="https://raw.githubusercontent.com/giomaglione75-crypto/boingyblue.github.io/main/BOINGYBLUE.png" class="mascotte" alt="BoingyBlu">
        <div>
            <h1>🧠 ACCADEMIA LINGUISTICA</h1>
            <p>Missione: L'Orchestra delle Parole!</p>
        </div>
    </div>

    <div class="game-box">
        <p>Clicca sulle parole nell'ordine giusto:</p>
        <div id="wordContainer"></div>
        <hr>
        <p><strong>La Tua Frase:</strong> <span id="displayFrase" style="font-weight:bold; color:#2980b9;"></span></p>
    </div>

    <div class="action-btns">
        <button class="btn-check" onclick="checkSentence()">Controlla Frase ✅</button>
        <button class="btn-check" style="background:#3498db" onclick="initGame()">Nuova Sfida 🚀</button>
    </div>
</div>

<script>
    const frasi = [
        ["Il", "gatto", "dorme", "sul", "divano"],
        ["Marco", "legge", "un", "libro", "bello"],
        ["I", "bambini", "giocano", "nel", "parco"]
    ];
    
    let currentFrase = [];
    let selectedWords = [];

    function initGame() {
        currentFrase = frasi[Math.floor(Math.random() * frasi.length)];
        let mescolate = [...currentFrase].sort(() => Math.random() - 0.5);
        
        const container = document.getElementById('wordContainer');
        container.innerHTML = '';
        selectedWords = [];
        document.getElementById('displayFrase').innerText = '';

        mescolate.forEach(w => {
            let btn = document.createElement('button');
            btn.className = 'word-btn';
            btn.innerText = w;
            btn.onclick = () => {
                selectedWords.push(w);
                btn.style.display = 'none';
                document.getElementById('displayFrase').innerText = selectedWords.join(' ');
            };
            container.appendChild(btn);
        });
    }

    function checkSentence() {
        if (selectedWords.join(' ') === currentFrase.join(' ')) {
            alert("🎉 Bravissimo! Hai composto la frase perfetta!");
            initGame();
        } else {
            alert("❌ Non è ancora corretto, riprova!");
            selectedWords = [];
            initGame();
        }
    }

    initGame();
</script>

</body>
</html>
